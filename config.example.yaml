# Rechroma configuration.
# Precedence: CLI flags > env vars (RECHROMA_* / TELEGRAM_BOT_TOKEN) > this file > defaults.
# Every value below is optional; shown with its default.

# --- Core / device ---
device: auto                 # auto | cuda | cpu
models_dir: /data/models     # where weights are downloaded + verified
model_base_url:              # optional self-hosted mirror: files fetched as ${model_base_url}/<filename>
render_factor:               # blank = device default (GPU 35, CPU 25); range 7-45
log_level: info              # debug | info | warning | error

# --- Web / API ---
port: 8000
data_dir: /data/jobs         # SQLite DB + uploaded/result images
web_auth_token:              # optional shared bearer token; blank = OPEN (warned) — put behind a proxy
max_upload_mb: 25
workers: 1                   # concurrent pipeline workers (models are memory-heavy)
retention_hours: 24          # delete originals + results after this many hours; 0 = immediately
rate_limit_per_hour: 10      # per client/chat; 0 disables

# --- Telegram bot (token via env TELEGRAM_BOT_TOKEN only; blank disables the bot) ---
telegram_bot_token:
telegram_webhook_url:        # set to run in webhook mode instead of long-polling
allowed_chat_ids: []         # allowlist; EMPTY = only admins may use the bot (never open)
admin_chat_ids: []           # always allowed; can use the bot even with an empty allowlist

# --- Video (v2) ---
# Video is colorize-only per frame with light temporal chroma smoothing.
# CPU video is very slow; a GPU is strongly recommended. Over-cap clips are rejected.
video_enabled: true
video_max_seconds: 30        # reject longer clips
video_max_resolution: 1080   # longer side; larger is rejected
video_max_fps: 24            # frames are extracted at <= this
video_max_mb: 200            # max upload size for video (web)
telegram_video_max_mb: 20    # smaller cap for Telegram (bot download limit)
video_smoothing_window: 5    # temporal chroma window; 1 disables
video_render_factor: 21      # modest default for speed across many frames
video_crf: 18                # x264 quality (lower = better/larger)
video_workspace_dir:         # blank = ${data_dir}/video

# --- Animate (living portrait) ---
# Standalone TPSMM face animation: a still portrait -> short animated mp4.
# Off by default (the user selects Animate); CPU works but is slow, GPU recommended.
animate_enabled: true
animate_driver: subtle       # bundled driving-motion clip
animate_max_frames: 120      # cap on output frames
animate_max_resolution: 2048 # reject source images whose longer side exceeds this
animate_crf: 18              # output x264 quality
animate_workspace_dir:       # blank = ${data_dir}/animate
