name: Docker

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version (blank = auto-increment YYYY.M.PATCH from latest tag)"
        required: false

permissions:
  contents: write # push the version tag that drives auto-increment

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve version
        id: version
        env:
          INPUT_VERSION: ${{ github.event.inputs.version }} # via env (injection-safe)
        run: |
          set -euo pipefail
          if [ -n "$INPUT_VERSION" ]; then
            VERSION="$INPUT_VERSION"
          else
            VERSION="$(./scripts/next-version.sh)"
          fi
          [ -n "$VERSION" ] || { echo "::error::could not resolve a version"; exit 1; }
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "$VERSION" > VERSION

      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Build the CPU image locally (load into the daemon) and scan it BEFORE
      # pushing, so a vulnerable image is never published.
      - name: Build CPU image (amd64) — load for scanning
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.cpu
          platforms: linux/amd64
          load: true
          push: false
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/rechroma:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/rechroma:${{ steps.version.outputs.version }}

      - name: Trivy scan CPU image (fail on HIGH/CRITICAL with a fix)
        # Pinned to v0.36.0's commit. Use >= v0.32.0: earlier trivy-action tags
        # internally reference deleted aquasecurity/setup-trivy tags (v0.2.1/v0.2.2)
        # and fail to resolve; v0.32.0+ pin setup-trivy by SHA.
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25
        with:
          image-ref: ${{ secrets.DOCKERHUB_USERNAME }}/rechroma:${{ steps.version.outputs.version }}
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "1"

      - name: Push CPU image (only reached if the scan passed)
        env:
          IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/rechroma
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          docker push "$IMAGE:$VERSION"
          docker push "$IMAGE:latest"

      # The CUDA image (nvidia base + torch cu12) is ~10GB and overruns the
      # runner's ~14GB disk once the CPU image and caches are present. Reclaim
      # space first: drop the already-pushed CPU image + build cache and remove
      # large preinstalled runner toolchains.
      - name: Free disk space for the CUDA build
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
            /opt/hostedtoolcache/CodeQL /usr/local/share/boost \
            "${AGENT_TOOLSDIRECTORY:-/opt/hostedtoolcache}" || true
          docker image prune -af || true
          docker builder prune -af || true
          df -h /

      # The CUDA image is built and pushed only after the CPU gate passes. It is
      # not Trivy-gated: its nvidia/cuda base carries base-OS CVEs that can't be
      # patched from here, and loading the multi-GB image to scan it is heavy.
      - name: Build & push CUDA image (amd64)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.cuda
          platforms: linux/amd64
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/rechroma:latest-cuda
            ${{ secrets.DOCKERHUB_USERNAME }}/rechroma:${{ steps.version.outputs.version }}-cuda

      - name: Tag published version
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "$VERSION"
          git push origin "$VERSION"
