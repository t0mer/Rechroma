name: Docker

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version (blank = auto-increment YYYY.M.PATCH from latest tag)"
        required: false

permissions:
  contents: write # push the version tag that drives auto-increment

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve version
        id: version
        env:
          INPUT_VERSION: ${{ github.event.inputs.version }} # via env (injection-safe)
        run: |
          set -euo pipefail
          if [ -n "$INPUT_VERSION" ]; then
            VERSION="$INPUT_VERSION"
          else
            VERSION="$(./scripts/next-version.sh)"
          fi
          [ -n "$VERSION" ] || { echo "::error::could not resolve a version"; exit 1; }
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "$VERSION" > VERSION

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & push CPU image (amd64, arm64)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.cpu
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/rechroma:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/rechroma:${{ steps.version.outputs.version }}

      - name: Build & push CUDA image (amd64)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.cuda
          platforms: linux/amd64
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/rechroma:latest-cuda
            ${{ secrets.DOCKERHUB_USERNAME }}/rechroma:${{ steps.version.outputs.version }}-cuda

      - name: Trivy scan (fail on HIGH/CRITICAL with a fix)
        # Pinned to the v0.28.0 commit (the tag is v0.28.0, not 0.28.0).
        uses: aquasecurity/trivy-action@915b19bbe73b92a6cf82a1bc12b087c9a19a5fe2
        with:
          image-ref: ${{ secrets.DOCKERHUB_USERNAME }}/rechroma:${{ steps.version.outputs.version }}
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "1"

      - name: Tag published version
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "$VERSION"
          git push origin "$VERSION"
